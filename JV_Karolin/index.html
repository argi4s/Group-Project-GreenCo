<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ground Access Control</title>
</head>
<body>
  <h1>Ground Access Control</h1>
  <pre id="status">Loading...</pre>
  <button onclick="sendUnlock()">Unlock</button>
  <button onclick="sendRelock()">Relock</button>

  <script>
    const token = "change-this-token";

    async function refresh() {
      const r = await fetch('/api/status');
      const data = await r.json();
      document.getElementById('status').textContent =
        JSON.stringify(data, null, 2);
    }

    async function sendUnlock() {
      const r = await fetch('/api/unlock', {
        method: 'POST',
        headers: { 'X-Access-Token': token }
      });
      const data = await r.json();
      alert(data.message);
      refresh();
    }

    async function sendRelock() {
      const r = await fetch('/api/relock', {
        method: 'POST',
        headers: { 'X-Access-Token': token }
      });
      const data = await r.json();
      alert(data.message);
      refresh();
    }

    setInterval(refresh, 1000);
    refresh();
  </script>
</body>
</html>
